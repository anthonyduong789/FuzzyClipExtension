<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuzzy Clip Extension</title>
  <script type="module" src="fuzzy.js"></script>
  <link rel="stylesheet" href="styles/fuzzy.css">
</head>

<body class="ff-container">

  <div class="ff-header">
    <div class="ff-left">
      <div class="ff-icon-box">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7" />
          <line x1="16.5" y1="16.5" x2="22" y2="22" />
        </svg>
      </div>
      <div class="ff-title-group">
        <span class="ff-title">Fuzzy Finder</span>
        <span class="ff-subtitle">Quick search</span>
      </div>
    </div>
    <div class="ff-right">
      <button class="ff-pill-btn" id="addNotesButton">
        <svg viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14" />
        </svg>
        Add Notes
      </button>
      <button class="ff-pill-btn select-to-delete" id="deleteNotesButton">
        <div class="select-to-delete-content-before">
          <svg class="trash-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,5 15,5" />
            <path d="M6 5V3.5A0.5 0.5 0 0 1 6.5 3h5a0.5 0.5 0 0 1 0.5 0.5V5" />
            <rect x="4" y="5" width="10" height="10" rx="1.5" />
            <line x1="7" y1="8" x2="7" y2="12" />
            <line x1="11" y1="8" x2="11" y2="12" />
          </svg>
          Select to Delete
        </div>

        <div class="select-to-delete-content-after">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="black"
            stroke-width="1.5" stroke-linecap="round">
            <line x1="1" y1="1" x2="11" y2="11"></line>
            <line x1="11" y1="1" x2="1" y2="11"></line>
          </svg>
            Cancel
        </div>

      </button>
      <button class="ff-pill-btn" id="addDummyDataButton">
        <svg viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14" />
        </svg>
        Add Dummy Data
      </button>
      <button class="ff-close-btn" id="closeInjected" title="Close">
        <svg viewBox="0 0 12 12">
          <line x1="1" y1="1" x2="11" y2="11" />
          <line x1="11" y1="1" x2="1" y2="11" />
        </svg>
      </button>
    </div>
  </div>

  <div class="ff-search-row">
    <div class="ff-search-icon">
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7" />
        <line x1="16.5" y1="16.5" x2="22" y2="22" />
      </svg>
    </div>
    <input class="ff-input" type="text" id="search-input" placeholder="Search notes, docs, tags…" />
    <span class="ff-kbd">⌘K</span>
  </div>

  <div id="results"></div>


  </div>

  <div class="ff-footer">
    <div class="ff-hints">
      <span class="ff-hint"><kbd>↑↓</kbd> navigate</span>
      <span class="ff-hint"><kbd>↵</kbd> open</span>
      <span class="ff-hint"><kbd>esc</kbd> close</span>
    </div>
    <span class="ff-count" id="ff-count">5 results</span>
  </div>

</body>



</html>
