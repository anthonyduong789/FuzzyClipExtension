<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Fuzzy Clip Extension</title>
      <script type="module" src="fuzzy.js"></script>
      <link rel="stylesheet" href="styles/fuzzy.css">
</head>

<body style="
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color:  var(--bg);
      color: white;">
      <div style="display:flex; gap: 1rem;">
            <button style="
margin-top: 10px;
padding: 5px 15px;
background: white;
color: #667eea;
border: none;
border-radius: 5px;
cursor: pointer;
white-space: nowrap;
">
                  Add Notes
            </button>
            <button id="closeInjected" style="
margin-top: 10px;
padding: 5px 15px;
background: white;
color: #667eea;
border: none;
border-radius: 5px;
cursor: pointer;
">Close</button>
      </div>

      <h1 style="font-size: 1.5rem; ">🔍 Fuzzy Finder</h1>
      <input type="text" id="search-input" placeholder="Type to search..." autocomplete="off" />
      <div id="results"></div>

</body>



</html>
