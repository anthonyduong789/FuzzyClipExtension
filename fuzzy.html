<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuzzy Clip Extension</title>
  <script type="module" src="fuzzy.js"></script>
  <link rel="stylesheet" href="styles/fuzzy.css">
</head>

<body class="ff-container">
  <div class="ff-header">
    <div class="ff-left">
      <div class="ff-icon-box">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7" />
          <line x1="16.5" y1="16.5" x2="22" y2="22" />
        </svg>
      </div>
      <div class="ff-title-group">
        <span class="ff-title">Fuzzy Finder</span>
        <span class="ff-subtitle">Quick search</span>
      </div>
    </div>
    <div class="ff-right">
      <button class="ff-close-btn" id="closeInjected" title="Close">
        <svg viewBox="0 0 12 12">
          <line x1="1" y1="1" x2="11" y2="11" />
          <line x1="11" y1="1" x2="1" y2="11" />
        </svg>
      </button>
    </div>
  </div>
  <!-- Default Overlay -->
  <div class="ff-overlay" id="default-overlay">
    <div class="ff-buttons">
      <button id="resetData">Reset Data</button>
      <button class="ff-pill-btn" id="addNotesButton">
        <svg viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14" />
        </svg>
        Add Notes
      </button>
      <button class="ff-pill-btn toggle-delete-mode" id="deleteNotesButton">
        <div class="select-to-delete-before">
          <svg class="trash-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,5 15,5" />
            <path d="M6 5V3.5A0.5 0.5 0 0 1 6.5 3h5a0.5 0.5 0 0 1 0.5 0.5V5" />
            <rect x="4" y="5" width="10" height="10" rx="1.5" />
            <line x1="7" y1="8" x2="7" y2="12" />
            <line x1="11" y1="8" x2="11" y2="12" />
          </svg>
          Select to Delete
        </div>
        <div class="select-to-delete-after">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="black" stroke-width="1.5"
            stroke-linecap="round">
            <line x1="1" y1="1" x2="11" y2="11"></line>
            <line x1="11" y1="1" x2="1" y2="11"></line>
          </svg>
          Cancel
        </div>
      </button>
      <div class="delete-mode" id="deleteGroup">
        <button class="ff-pill-btn" id="selectAllDeleteMode">
          Select All
        </button>
        <button class="ff-pill-btn" id="deleteSelectedElements">
          <svg class="trash-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,5 15,5" />
            <path d="M6 5V3.5A0.5 0.5 0 0 1 6.5 3h5a0.5 0.5 0 0 1 0.5 0.5V5" />
            <rect x="4" y="5" width="10" height="10" rx="1.5" />
            <line x1="7" y1="8" x2="7" y2="12" />
            <line x1="11" y1="8" x2="11" y2="12" />
          </svg>
          Delete
        </button>
        <div class="action-btns " id="actionBtnsSelectDelete">
          <button class="btn confirm-btn confirmDeleteBtn" id="confirmDeleteSelected" aria-label="Confirm delete">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="var(--color-text-success)"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2.5,8 6.5,12 13.5,4" />
            </svg>
          </button>
          <button class="btn cancel-btn cancelDeleteBtn" id="cancelDeleteSelectBtn" aria-label="Cancel">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="var(--color-text-secondary)"
              stroke-width="1.5" stroke-linecap="round">
              <line x1="1" y1="1" x2="11" y2="11" />
              <line x1="11" y1="1" x2="1" y2="11" />
            </svg>
          </button>
        </div>

      </div>
      <button style="background: none;" class="settings-button" id="showSettings" aria-label="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
          <circle cx="128" cy="128" r="40" fill="none" stroke-linecap="round" stroke-linejoin="round"
            stroke-width="16" />
          <path
            d="M41.43,178.09A99.14,99.14,0,0,1,31.36,153.8l16.78-21a81.59,81.59,0,0,1,0-9.64l-16.77-21a99.43,99.43,0,0,1,10.05-24.3l26.71-3a81,81,0,0,1,6.81-6.81l3-26.7A99.14,99.14,0,0,1,102.2,31.36l21,16.78a81.59,81.59,0,0,1,9.64,0l21-16.77a99.43,99.43,0,0,1,24.3,10.05l3,26.71a81,81,0,0,1,6.81,6.81l26.7,3a99.14,99.14,0,0,1,10.07,24.29l-16.78,21a81.59,81.59,0,0,1,0,9.64l16.77,21a99.43,99.43,0,0,1-10,24.3l-26.71,3a81,81,0,0,1-6.81,6.81l-3,26.7a99.14,99.14,0,0,1-24.29,10.07l-21-16.78a81.59,81.59,0,0,1-9.64,0l-21,16.77a99.43,99.43,0,0,1-24.3-10l-3-26.71a81,81,0,0,1-6.81-6.81Z"
            fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="16" />
        </svg>
      </button>
    </div>
    <div class="ff-search-row">
      <div class="ff-search-icon">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7" />
          <line x1="16.5" y1="16.5" x2="22" y2="22" />
        </svg>
      </div>
      <input class="ff-input" type="text" id="search-input" placeholder="Search notes, docs, tags…" />
      <span class="ff-kbd">Ctrl+Q</span>
    </div>
    <div id="results"></div>
  </div>
  </div>
  <!-- Hotkey Overlay -->
  <div  class="ff-overlay hidden" id="hotkey-overlay">
    <div style="flex-grow: 1; display: flex; flex-direction: column; gap: 10px;" class="ff-buttons">
      <span class="ff-hint"><kbd>ctrl+c</kbd> copy selected content to clipboard</span>
      <span class="ff-hint"><kbd>enter</kbd> open selected item</span>
      <span class="ff-hint"><kbd>ctrl + j</kbd> go to next result</span>
      <span class="ff-hint"><kbd>ctrl + k</kbd> go to previous result</span>
      <span class="ff-hint"><kbd>ctrl + q</kbd> close and open window</span>
    </div>

  </div>
  <!-- Setting Overlay -->
  <div class="ff-overlay hidden" id="setting-overlay">
    <div class="ff-buttons">
      <button style="display: none;" class="ff-pill-btn" id="saveSettingsButton">Save Changes</button>
      <div class="action-btns " id="actionBtnsSettings">
        <button class="btn confirm-btn confirmDeleteBtn" id="confirmSettingsButton" aria-label="Confirm delete">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="var(--color-text-success)"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2.5,8 6.5,12 13.5,4" />
          </svg>
        </button>
        <button class="btn cancel-btn cancelDeleteBtn" id="cancelSettingsButton" aria-label="Cancel">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="var(--color-text-secondary)"
            stroke-width="1.5" stroke-linecap="round">
            <line x1="1" y1="1" x2="11" y2="11" />
            <line x1="11" y1="1" x2="1" y2="11" />
          </svg>
        </button>
      </div>
      <button
        style="display: flex; background: none; margin-left: auto; justify-content: center; align-items: center; border: none; color: #5a534a; cursor: pointer;"
        id="returnFromSettings">
        return
        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="#000000" viewBox="0 0 256 256">
          <path
            d="M208,32H48A16,16,0,0,0,32,48V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V48A16,16,0,0,0,208,32Zm0,176H48V48H208ZM82.34,133.66a8,8,0,0,1,0-11.32l32-32a8,8,0,0,1,11.32,11.32L107.31,120H168a8,8,0,0,1,0,16H107.31l18.35,18.34a8,8,0,0,1-11.32,11.32Z"
            fill="#5a534a">
          </path>
        </svg>
      </button>
    </div>
    <div class="ff-highlight-row">
      <span class="ff-hl-label">highlight color:</span>
      <span class="ff-hl-swatch amber" data-color="amber">match</span>
      <span class="ff-hl-swatch green" data-color="green">match</span>
      <span class="ff-hl-swatch blue" data-color="blue">match</span>
      <span class="ff-hl-swatch pink" data-color="pink">match</span>
      <span class="ff-hl-swatch coral" data-color="coral">match</span>
    </div>
  </div>
  <div class="ff-footer">
    <div class="ff-hints">
      <span class="ff-hint"><kbd>↑↓</kbd> navigate</span>
      <span class="ff-hint"><kbd>↵</kbd> open</span>
      <span class="ff-hint"><kbd>esc</kbd> close</span>
      <span class="ff-hint"><kbd>ctrl+/</kbd></span>
    </div>
    <span class="ff-count" id="ff-count">5 results</span>
  </div>
</body>

</html>
