<!DOCTYPE html>
<html lang="en">

<head>
  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-width: 500px;
      margin: 0;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    input {
      width: 320px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px #2563eb55;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 12px;
      width: 320px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      max-height: 320px;
      overflow: hidden;
    }

    li {
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    li span.highlight {
      color: #3b82f6;
      font-weight: 600;
    }

    li.active {
      background: #3b82f6;
      color: white;
    }

    li.active span.highlight {
      color: #fff;
      text-decoration: underline;
    }

    li:hover {
      background: #334155;
    }

    .no-match {
      color: #94a3b8;
      font-style: italic;
      text-align: center;
      padding: 10px;
    }

    .list-box {
      height: 320px;
    }

    section {
      display: flex;
      flex-direction: column;
      justify-items: center;
      align-items: center;
    }

  </style>
</head>

<body>
  <section>
    <h1>🔍 Fuzzy Finder</h1>
    <input type="text" id="search" placeholder="Type to search..." autocomplete="off" />
    <div class="list-box">
      <ul id="results"></ul>

    </div>
  </section>
  <script src="./fuzzy.js"></script>


</body>

</html>
